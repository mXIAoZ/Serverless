<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">Metrics and autoscaling path</title>
  <desc id="desc">Metrics forwarding from runtime-agent to gateway and scalersvc, periodic evaluation, and internal scale up or scale down through gateway internal APIs.</desc>
  <defs>
    <style>
      .canvas { fill: #fbfbf8; }
      .title { font-family: SimSun, "Songti SC", serif; font-size: 26px; font-weight: 700; fill: #1f2937; }
      .cluster { fill: #ffffff; stroke: #b7c0cc; stroke-width: 2; rx: 18; }
      .box { fill: #f7fbff; stroke: #2f5d8c; stroke-width: 2; rx: 12; }
      .box-internal { fill: #f7f4ff; stroke: #6b4fa3; stroke-width: 2; rx: 12; }
      .box-scale { fill: #fff8ed; stroke: #9a6a1f; stroke-width: 2; rx: 12; }
      .note { fill: #fffef3; stroke: #c4a000; stroke-width: 1.6; rx: 10; }
      .label-cn { font-family: SimSun, "Songti SC", serif; font-size: 18px; fill: #111827; }
      .label-en { font-family: "Times New Roman", Times, serif; font-size: 18px; fill: #111827; }
      .small-cn { font-family: SimSun, "Songti SC", serif; font-size: 15px; fill: #374151; }
      .small-en { font-family: "Times New Roman", Times, serif; font-size: 15px; fill: #374151; }
      .formula { font-family: "Cambria Math", "STIX Two Math", "Times New Roman", serif; font-size: 18px; font-style: italic; fill: #3b2f63; }
      .arrow { stroke: #374151; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .arrow-dashed { stroke: #6b7280; stroke-width: 2.2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow-gray); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#374151"/></marker>
    <marker id="arrow-gray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#6b7280"/></marker>
  </defs>

  <rect class="canvas" width="1500" height="900"/>
  <text x="58" y="56" class="title">指标与扩缩容链路</text>
  <text x="58" y="84" class="small-en">Runtime metrics are ingested by gateway, evaluated by scalersvc, and applied through gateway internal APIs.</text>

  <rect x="45" y="125" width="270" height="525" class="cluster"/>
  <text x="72" y="163" class="label-cn">函数实例</text>
  <rect x="82" y="230" width="195" height="82" class="box"/>
  <text x="116" y="263" class="label-en">Runtime Agent</text>
  <text x="104" y="288" class="small-cn">采样延迟、错误率、调用数</text>

  <rect x="380" y="125" width="300" height="525" class="cluster"/>
  <text x="410" y="163" class="label-cn">Gateway</text>
  <rect x="432" y="230" width="195" height="82" class="box"/>
  <text x="468" y="263" class="label-en">Metrics Ingress</text>
  <text x="454" y="288" class="small-en">POST /containers/{id}/metrics</text>
  <rect x="432" y="430" width="195" height="82" class="box-internal"/>
  <text x="472" y="463" class="label-en">Internal APIs</text>
  <text x="453" y="488" class="small-cn">函数、实例、队列、扩缩容</text>

  <rect x="745" y="125" width="360" height="525" class="cluster"/>
  <text x="775" y="163" class="label-cn">ScalerSvc</text>
  <rect x="810" y="200" width="230" height="75" class="box-scale"/>
  <text x="862" y="231" class="label-en">Metrics Store</text>
  <text x="846" y="255" class="small-cn">latest metrics by container</text>
  <rect x="810" y="330" width="230" height="75" class="box-scale"/>
  <text x="858" y="361" class="label-en">Evaluation Loop</text>
  <text x="862" y="385" class="small-en">period = 5s</text>
  <rect x="810" y="460" width="230" height="75" class="box-scale"/>
  <text x="872" y="491" class="label-en">Decision</text>
  <text x="835" y="515" class="small-cn">scale up / scale down / none</text>

  <rect x="1170" y="125" width="280" height="525" class="cluster"/>
  <text x="1200" y="163" class="label-cn">Scheduler</text>
  <rect x="1215" y="260" width="190" height="82" class="box-internal"/>
  <text x="1252" y="293" class="label-en">ColdStartOne</text>
  <text x="1242" y="318" class="small-cn">预热一个实例</text>
  <rect x="1215" y="430" width="190" height="82" class="box-internal"/>
  <text x="1256" y="463" class="label-en">RemoveIdle</text>
  <text x="1244" y="488" class="small-cn">移除最旧 idle 实例</text>

  <path class="arrow" d="M277 271 H432"/>
  <text x="302" y="250" class="small-en">metrics every 10s</text>
  <path class="arrow" d="M627 271 H810"/>
  <text x="665" y="250" class="small-en">forward metrics</text>
  <path class="arrow-dashed" d="M925 275 V330"/>
  <path class="arrow-dashed" d="M925 405 V460"/>

  <path class="arrow" d="M810 367 H627 V471"/>
  <text x="650" y="350" class="small-en">GET /internal/functions</text>
  <text x="650" y="371" class="small-en">GET /internal/stats/{func}</text>
  <text x="650" y="392" class="small-en">GET /internal/queue/{func}</text>

  <path class="arrow" d="M1040 497 H1140 V301 H1215"/>
  <text x="1090" y="285" class="small-en">scale-up</text>
  <path class="arrow" d="M1040 497 H1140 V471 H1215"/>
  <text x="1090" y="455" class="small-en">scale-down</text>

  <rect x="70" y="710" width="405" height="88" class="note"/>
  <text x="94" y="740" class="small-cn">利用率：</text>
  <text x="165" y="740" class="formula">u = busy / max(1, busy + idle)</text>
  <text x="94" y="766" class="small-cn">当实例总数为 0 时使用分母保护，避免除零。</text>

  <rect x="545" y="710" width="390" height="88" class="note"/>
  <text x="570" y="740" class="small-cn">尾延迟阈值：</text>
  <text x="685" y="740" class="formula">p99 = Q₀.₉₉(latency)</text>
  <text x="570" y="766" class="small-cn">高 p99 可触发预热，降低冷启动影响。</text>

  <rect x="1005" y="710" width="390" height="88" class="note"/>
  <text x="1030" y="740" class="small-cn">排队压力：</text>
  <text x="1130" y="740" class="formula">q = queued / max(1, maxQueue)</text>
  <text x="1030" y="766" class="small-cn">队列接近上限时优先 scale up。</text>
</svg>

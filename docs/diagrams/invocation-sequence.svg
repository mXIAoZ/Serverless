<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Synchronous invocation path</title>
  <desc id="desc">Sequence diagram for a synchronous function invocation through gateway queue, router, scheduler, runtime agent, runtime API, bootstrap, and user handler.</desc>
  <defs>
    <style>
      .canvas { fill: #fbfbf8; }
      .title { font-family: SimSun, "Songti SC", serif; font-size: 26px; font-weight: 700; fill: #1f2937; }
      .lane { stroke: #c7ced8; stroke-width: 1.8; stroke-dasharray: 7 7; }
      .actor { fill: #f7fbff; stroke: #2f5d8c; stroke-width: 2; rx: 12; }
      .actor-runtime { fill: #f0fff6; stroke: #2f7d4f; stroke-width: 2; rx: 12; }
      .actor-internal { fill: #f7f4ff; stroke: #6b4fa3; stroke-width: 2; rx: 12; }
      .activation { fill: #e8f2ff; stroke: #5a7ca3; stroke-width: 1.5; rx: 4; }
      .note { fill: #fffef3; stroke: #c4a000; stroke-width: 1.6; rx: 10; }
      .label-cn { font-family: SimSun, "Songti SC", serif; font-size: 17px; fill: #111827; }
      .label-en { font-family: "Times New Roman", Times, serif; font-size: 17px; fill: #111827; }
      .small-cn { font-family: SimSun, "Songti SC", serif; font-size: 14px; fill: #374151; }
      .small-en { font-family: "Times New Roman", Times, serif; font-size: 14px; fill: #374151; }
      .formula { font-family: "Cambria Math", "STIX Two Math", "Times New Roman", serif; font-size: 18px; font-style: italic; fill: #3b2f63; }
      .arrow { stroke: #374151; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .return { stroke: #6b7280; stroke-width: 2; fill: none; stroke-dasharray: 7 5; marker-end: url(#arrow-gray); }
      .guard { fill: #fff8ed; stroke: #9a6a1f; stroke-width: 1.7; rx: 10; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#374151"/></marker>
    <marker id="arrow-gray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#6b7280"/></marker>
  </defs>

  <rect class="canvas" width="1600" height="980"/>
  <text x="58" y="56" class="title">请求调用链路</text>
  <text x="58" y="84" class="small-en">Synchronous invocation path with admission control, instance acquisition, runtime dispatch, and release.</text>

  <g id="actors">
    <rect x="55" y="130" width="130" height="58" class="actor"/><text x="92" y="164" class="label-en">Client</text>
    <rect x="235" y="130" width="130" height="58" class="actor"/><text x="268" y="164" class="label-en">Gateway</text>
    <rect x="415" y="130" width="130" height="58" class="actor"/><text x="455" y="164" class="label-en">Queue</text>
    <rect x="595" y="130" width="130" height="58" class="actor"/><text x="632" y="164" class="label-en">Router</text>
    <rect x="775" y="130" width="130" height="58" class="actor-internal"/><text x="805" y="164" class="label-en">Scheduler</text>
    <rect x="955" y="130" width="130" height="58" class="actor-runtime"/><text x="973" y="158" class="label-en">Runtime Agent</text><text x="1002" y="178" class="small-en">:9001</text>
    <rect x="1135" y="130" width="130" height="58" class="actor-runtime"/><text x="1160" y="158" class="label-en">Runtime API</text><text x="1182" y="178" class="small-en">:9000</text>
    <rect x="1315" y="130" width="130" height="58" class="actor-runtime"/><text x="1341" y="164" class="label-en">Bootstrap</text>
    <rect x="1495" y="130" width="90" height="58" class="actor-runtime"/><text x="1510" y="158" class="label-en">Handler</text><text x="1515" y="178" class="small-cn">函数</text>
  </g>

  <g id="lifelines">
    <line x1="120" y1="188" x2="120" y2="880" class="lane"/>
    <line x1="300" y1="188" x2="300" y2="880" class="lane"/>
    <line x1="480" y1="188" x2="480" y2="880" class="lane"/>
    <line x1="660" y1="188" x2="660" y2="880" class="lane"/>
    <line x1="840" y1="188" x2="840" y2="880" class="lane"/>
    <line x1="1020" y1="188" x2="1020" y2="880" class="lane"/>
    <line x1="1200" y1="188" x2="1200" y2="880" class="lane"/>
    <line x1="1380" y1="188" x2="1380" y2="880" class="lane"/>
    <line x1="1540" y1="188" x2="1540" y2="880" class="lane"/>
  </g>

  <rect x="292" y="235" width="16" height="560" class="activation"/>
  <rect x="472" y="280" width="16" height="470" class="activation"/>
  <rect x="652" y="390" width="16" height="315" class="activation"/>
  <rect x="832" y="430" width="16" height="120" class="activation"/>
  <rect x="1012" y="500" width="16" height="130" class="activation"/>
  <rect x="1192" y="540" width="16" height="80" class="activation"/>
  <rect x="1372" y="585" width="16" height="90" class="activation"/>
  <rect x="1532" y="625" width="16" height="50" class="activation"/>

  <path class="arrow" d="M120 245 H292"/><text x="145" y="230" class="label-en">POST /invoke/{name}</text>
  <path class="arrow" d="M308 295 H472"/><text x="330" y="280" class="label-en">acquire slot</text>
  <rect x="560" y="235" width="340" height="95" class="guard"/>
  <text x="585" y="263" class="label-cn">队列边界条件</text>
  <text x="585" y="290" class="small-en">queue full → 429</text>
  <text x="585" y="313" class="small-en">queue timeout → 503</text>

  <path class="arrow" d="M488 405 H652"/><text x="522" y="390" class="label-en">Invoke</text>
  <path class="arrow" d="M668 445 H832"/><text x="690" y="430" class="label-en">Acquire instance</text>
  <rect x="900" y="370" width="355" height="76" class="note"/>
  <text x="925" y="398" class="small-cn">没有 idle 实例时：</text>
  <text x="1045" y="398" class="formula">cold start = create + waitReady</text>
  <text x="925" y="424" class="small-en">Docker container or Kubernetes Pod is created by RuntimeBackend.</text>

  <path class="return" d="M832 505 H668"/><text x="697" y="490" class="label-en">instance address</text>
  <path class="arrow" d="M668 520 H1012"/><text x="755" y="505" class="label-en">POST /invoke</text>
  <path class="arrow" d="M1028 560 H1192"/><text x="1055" y="545" class="label-en">proxy request</text>
  <path class="arrow" d="M1208 600 H1372"/><text x="1226" y="585" class="label-en">/runtime/invocation/next</text>
  <path class="arrow" d="M1388 640 H1532"/><text x="1415" y="625" class="label-en">handler(event, context)</text>
  <path class="return" d="M1532 675 H1388"/><text x="1435" y="662" class="label-en">result</text>
  <path class="arrow" d="M1372 692 H1208"/><text x="1228" y="713" class="small-en">POST /runtime/invocation/{id}/response</text>
  <path class="return" d="M1192 730 H1028"/><text x="1070" y="717" class="label-en">invoke result</text>
  <path class="return" d="M1012 755 H668"/><text x="760" y="742" class="label-en">response + metrics</text>
  <path class="arrow" d="M652 780 H848"/><text x="700" y="765" class="label-en">Release instance</text>
  <path class="return" d="M652 815 H488"/><text x="540" y="802" class="label-en">done</text>
  <path class="return" d="M472 845 H120"/><text x="230" y="832" class="label-en">handler response</text>

  <rect x="58" y="900" width="575" height="54" class="note"/>
  <text x="82" y="930" class="small-cn">入口并发估算：</text>
  <text x="200" y="930" class="formula">C ≈ λ × p99_latency</text>
  <text x="385" y="930" class="small-cn">，用于设置 per-function slot。</text>

  <rect x="760" y="900" width="610" height="54" class="note"/>
  <text x="785" y="930" class="small-cn">端到端超时上界：</text>
  <text x="930" y="930" class="formula">T_total ≤ T_queue + T_function</text>
  <text x="1165" y="930" class="small-cn">，客户端取消会向下传播。</text>
</svg>

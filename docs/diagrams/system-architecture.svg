<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">FaaS system architecture</title>
  <desc id="desc">Gateway-centered local FaaS architecture with queueing, scheduling, runtime, metrics, scaling, and internal logging components.</desc>
  <defs>
    <style>
      .canvas { fill: #fbfbf8; }
      .cluster { fill: #ffffff; stroke: #b7c0cc; stroke-width: 2; rx: 18; }
      .cluster-title { font-family: SimSun, "Songti SC", serif; font-size: 22px; font-weight: 700; fill: #1f2a37; }
      .box { fill: #f7fbff; stroke: #2f5d8c; stroke-width: 2; rx: 12; }
      .box-alt { fill: #fff8ed; stroke: #9a6a1f; stroke-width: 2; rx: 12; }
      .box-internal { fill: #f7f4ff; stroke: #6b4fa3; stroke-width: 2; rx: 12; }
      .box-runtime { fill: #f0fff6; stroke: #2f7d4f; stroke-width: 2; rx: 12; }
      .label-cn { font-family: SimSun, "Songti SC", serif; font-size: 18px; fill: #111827; }
      .label-en { font-family: "Times New Roman", Times, serif; font-size: 18px; fill: #111827; }
      .small-cn { font-family: SimSun, "Songti SC", serif; font-size: 15px; fill: #374151; }
      .small-en { font-family: "Times New Roman", Times, serif; font-size: 15px; fill: #374151; }
      .formula { font-family: "Cambria Math", "STIX Two Math", "Times New Roman", serif; font-size: 18px; font-style: italic; fill: #3b2f63; }
      .arrow { stroke: #374151; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .arrow-dashed { stroke: #6b7280; stroke-width: 2.2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow-gray); }
      .note { fill: #fffef3; stroke: #c4a000; stroke-width: 1.6; rx: 10; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#374151"/>
    </marker>
    <marker id="arrow-gray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect class="canvas" width="1600" height="980"/>
  <text x="60" y="58" class="cluster-title">当前架构图</text>
  <text x="60" y="86" class="small-en">Gateway is the only user-facing entrypoint; scaler and logdaemon are internal control-plane services.</text>

  <rect x="40" y="120" width="270" height="730" class="cluster"/>
  <text x="68" y="158" class="cluster-title">用户入口</text>
  <rect x="82" y="205" width="185" height="78" class="box"/>
  <text x="125" y="238" class="label-en">Client / curl</text>
  <text x="118" y="263" class="small-cn">用户只访问 gateway</text>

  <rect x="380" y="120" width="430" height="730" class="cluster"/>
  <text x="408" y="158" class="cluster-title">Gateway Process</text>
  <rect x="488" y="200" width="205" height="75" class="box"/>
  <text x="535" y="231" class="label-en">Gateway</text>
  <text x="520" y="256" class="small-en">HTTP :8080</text>

  <rect x="455" y="330" width="270" height="78" class="box"/>
  <text x="492" y="362" class="label-en">Per-function Queue</text>
  <text x="493" y="387" class="small-cn">背压与入口排队</text>

  <rect x="455" y="462" width="270" height="76" class="box"/>
  <text x="565" y="493" class="label-en">Router</text>
  <text x="494" y="517" class="small-cn">一次同步调用转发</text>

  <rect x="455" y="590" width="270" height="78" class="box"/>
  <text x="548" y="622" class="label-en">Scheduler</text>
  <text x="494" y="647" class="small-cn">实例池、冷启动、回收</text>

  <rect x="455" y="720" width="270" height="78" class="box-internal"/>
  <text x="520" y="752" class="label-en">Internal APIs</text>
  <text x="496" y="777" class="small-cn">供 scaler / log proxy 使用</text>

  <rect x="870" y="120" width="315" height="730" class="cluster"/>
  <text x="900" y="158" class="cluster-title">运行后端</text>
  <rect x="940" y="250" width="190" height="72" class="box-alt"/>
  <text x="975" y="281" class="label-en">RuntimeBackend</text>
  <text x="969" y="305" class="small-cn">后端抽象接口</text>
  <rect x="915" y="410" width="145" height="70" class="box-alt"/>
  <text x="948" y="441" class="label-en">Docker</text>
  <text x="941" y="464" class="small-en">Engine API</text>
  <rect x="1090" y="410" width="145" height="70" class="box-alt"/>
  <text x="1119" y="441" class="label-en">Kubernetes</text>
  <text x="1124" y="464" class="small-en">client-go</text>

  <rect x="1260" y="120" width="290" height="730" class="cluster"/>
  <text x="1288" y="158" class="cluster-title">Function Container / Pod</text>
  <rect x="1315" y="215" width="175" height="68" class="box-runtime"/>
  <text x="1350" y="245" class="label-en">Runtime Agent</text>
  <text x="1365" y="267" class="small-en">:9001</text>
  <rect x="1315" y="340" width="175" height="68" class="box-runtime"/>
  <text x="1340" y="370" class="label-en">Runtime API</text>
  <text x="1365" y="392" class="small-en">:9000</text>
  <rect x="1315" y="465" width="175" height="68" class="box-runtime"/>
  <text x="1360" y="495" class="label-en">Bootstrap</text>
  <text x="1346" y="517" class="small-en">python3 / go</text>
  <rect x="1315" y="590" width="175" height="68" class="box-runtime"/>
  <text x="1350" y="620" class="label-en">User Handler</text>
  <text x="1348" y="642" class="small-cn">用户函数逻辑</text>

  <rect x="880" y="885" width="335" height="62" class="note"/>
  <text x="905" y="912" class="small-cn">入口压力近似：</text>
  <text x="1010" y="912" class="formula">L = λ · W</text>
  <text x="905" y="935" class="small-en">Little's Law: concurrency equals arrival rate times latency.</text>

  <rect x="1245" y="885" width="305" height="62" class="note"/>
  <text x="1268" y="912" class="small-cn">扩缩容利用率：</text>
  <text x="1382" y="912" class="formula">u = busy / max(1, total)</text>
  <text x="1268" y="935" class="small-cn">scalersvc 只通过内部 API 操作。</text>

  <path class="arrow" d="M267 244 H488"/>
  <path class="arrow" d="M590 275 V330"/>
  <path class="arrow" d="M590 408 V462"/>
  <path class="arrow" d="M590 538 V590"/>
  <path class="arrow" d="M725 629 H940 V322"/>
  <path class="arrow" d="M1035 322 V410"/>
  <path class="arrow" d="M1035 322 H1162 V410"/>
  <path class="arrow" d="M1060 445 H1260 V249 H1315"/>
  <path class="arrow" d="M1235 445 H1260 V249 H1315"/>
  <path class="arrow" d="M1315 249 H1190 V500 H725"/>
  <path class="arrow" d="M1402 283 V340"/>
  <path class="arrow" d="M1402 408 V465"/>
  <path class="arrow" d="M1402 533 V590"/>

  <path class="arrow-dashed" d="M1315 249 H815 V236 H693"/>
  <text x="835" y="220" class="small-en">metrics every 10s</text>
  <path class="arrow-dashed" d="M693 236 H760 V759 H725"/>
  <text x="733" y="565" class="small-en" transform="rotate(90 733 565)">forward metrics</text>
  <path class="arrow-dashed" d="M725 759 H815 V755 H455"/>

  <path class="arrow-dashed" d="M1060 480 V760 H725"/>
  <text x="914" y="744" class="small-en">docker events / logs</text>
  <path class="arrow-dashed" d="M1162 480 V720 H725"/>
  <text x="1010" y="704" class="small-en">collector metadata</text>
</svg>

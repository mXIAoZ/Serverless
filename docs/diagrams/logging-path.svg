<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="940" viewBox="0 0 1600 940" role="img" aria-labelledby="title desc">
  <title id="title">Log collection path</title>
  <desc id="desc">Gateway log API routes user log reads to internal logdaemon. Docker backend reads Docker logs. Kubernetes backend routes through host proxy and node-local collector using Kubernetes exec.</desc>
  <defs>
    <style>
      .canvas { fill: #fbfbf8; }
      .title { font-family: SimSun, "Songti SC", serif; font-size: 26px; font-weight: 700; fill: #1f2937; }
      .cluster { fill: #ffffff; stroke: #b7c0cc; stroke-width: 2; rx: 18; }
      .box { fill: #f7fbff; stroke: #2f5d8c; stroke-width: 2; rx: 12; }
      .box-docker { fill: #eef8ff; stroke: #1b6ca8; stroke-width: 2; rx: 12; }
      .box-k8s { fill: #f0fff6; stroke: #2f7d4f; stroke-width: 2; rx: 12; }
      .box-internal { fill: #f7f4ff; stroke: #6b4fa3; stroke-width: 2; rx: 12; }
      .note { fill: #fffef3; stroke: #c4a000; stroke-width: 1.6; rx: 10; }
      .label-cn { font-family: SimSun, "Songti SC", serif; font-size: 18px; fill: #111827; }
      .label-en { font-family: "Times New Roman", Times, serif; font-size: 18px; fill: #111827; }
      .small-cn { font-family: SimSun, "Songti SC", serif; font-size: 15px; fill: #374151; }
      .small-en { font-family: "Times New Roman", Times, serif; font-size: 15px; fill: #374151; }
      .formula { font-family: "Cambria Math", "STIX Two Math", "Times New Roman", serif; font-size: 18px; font-style: italic; fill: #3b2f63; }
      .arrow { stroke: #374151; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .arrow-dashed { stroke: #6b7280; stroke-width: 2.2; fill: none; stroke-dasharray: 8 6; marker-end: url(#arrow-gray); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#374151"/></marker>
    <marker id="arrow-gray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#6b7280"/></marker>
  </defs>

  <rect class="canvas" width="1600" height="940"/>
  <text x="58" y="56" class="title">日志采集链路</text>
  <text x="58" y="84" class="small-en">The public log API is exposed by gateway; logdaemon, proxy, and collectors are internal implementation details.</text>

  <rect x="45" y="125" width="300" height="650" class="cluster"/>
  <text x="75" y="163" class="label-cn">用户入口</text>
  <rect x="92" y="235" width="205" height="78" class="box"/>
  <text x="145" y="266" class="label-en">Client</text>
  <text x="116" y="291" class="small-cn">curl / user tooling</text>
  <rect x="82" y="430" width="225" height="82" class="box"/>
  <text x="124" y="462" class="label-en">Gateway Log API</text>
  <text x="108" y="488" class="small-en">GET /logs/{funcName}</text>

  <rect x="410" y="125" width="320" height="650" class="cluster"/>
  <text x="440" y="163" class="label-cn">内部日志入口</text>
  <rect x="462" y="330" width="215" height="88" class="box-internal"/>
  <text x="497" y="363" class="label-en">Internal logdaemon</text>
  <text x="535" y="389" class="small-en">:9200</text>

  <rect x="790" y="125" width="345" height="650" class="cluster"/>
  <text x="820" y="163" class="label-cn">Docker backend</text>
  <rect x="842" y="225" width="230" height="74" class="box-docker"/>
  <text x="898" y="255" class="label-en">Docker Engine</text>
  <text x="883" y="279" class="small-en">events and log streams</text>
  <rect x="842" y="385" width="230" height="74" class="box-docker"/>
  <text x="870" y="415" class="label-en">logdaemon docker mode</text>
  <text x="882" y="439" class="small-cn">按函数写入内存 ring</text>
  <rect x="842" y="545" width="230" height="74" class="box-docker"/>
  <text x="875" y="575" class="label-en">Ring Buffer</text>
  <text x="878" y="599" class="small-en">/tmp/faas-logs/*.log</text>

  <rect x="1195" y="125" width="355" height="650" class="cluster"/>
  <text x="1225" y="163" class="label-cn">Kubernetes backend</text>
  <rect x="1245" y="220" width="230" height="74" class="box-k8s"/>
  <text x="1285" y="250" class="label-en">logdaemon proxy</text>
  <text x="1276" y="274" class="small-cn">宿主机内部代理模式</text>
  <rect x="1245" y="365" width="230" height="74" class="box-internal"/>
  <text x="1274" y="395" class="label-en">Gateway Internal API</text>
  <text x="1274" y="419" class="small-en">/internal/instances/{func}</text>
  <rect x="1245" y="510" width="230" height="74" class="box-k8s"/>
  <text x="1275" y="540" class="label-en">Node-local Collector</text>
  <text x="1270" y="564" class="small-cn">DaemonSet per node</text>
  <rect x="1245" y="655" width="230" height="74" class="box-k8s"/>
  <text x="1282" y="685" class="label-en">Pod Log API</text>
  <text x="1273" y="709" class="small-en">Kubernetes in-cluster API</text>

  <path class="arrow" d="M195 313 V430"/>
  <path class="arrow" d="M307 471 H462"/>
  <text x="327" y="452" class="small-en">HTTP proxy</text>
  <path class="arrow" d="M677 374 H842 V582"/>
  <text x="700" y="356" class="small-en">FAAS_BACKEND=docker</text>
  <path class="arrow" d="M957 299 V385"/>
  <path class="arrow" d="M957 459 V545"/>
  <path class="arrow" d="M842 582 H677 V374"/>

  <path class="arrow" d="M677 374 H1195 V257 H1245"/>
  <text x="915" y="356" class="small-en">FAAS_BACKEND=k8s</text>
  <path class="arrow" d="M1360 294 V365"/>
  <text x="1378" y="333" class="small-en">lookup nodeName</text>
  <path class="arrow" d="M1360 439 V510"/>
  <text x="1378" y="478" class="small-cn">pods/exec 进入 collector</text>
  <path class="arrow" d="M1360 584 V655"/>
  <text x="1378" y="623" class="small-en">PodLog stream</text>
  <path class="return arrow-dashed" d="M1245 547 H1148 V374 H677"/>

  <rect x="80" y="825" width="420" height="58" class="note"/>
  <text x="105" y="858" class="small-cn">tail 查询窗口：</text>
  <text x="220" y="858" class="formula">entries = last_N(buffer, N = tail)</text>

  <rect x="570" y="825" width="430" height="58" class="note"/>
  <text x="595" y="858" class="small-cn">ring buffer 空间：</text>
  <text x="725" y="858" class="formula">space = O(min(totalLogs, capacity))</text>

  <rect x="1070" y="825" width="440" height="58" class="note"/>
  <text x="1095" y="858" class="small-cn">Kubernetes 路由键：</text>
  <text x="1240" y="858" class="formula">collector = f(nodeName)</text>
</svg>
